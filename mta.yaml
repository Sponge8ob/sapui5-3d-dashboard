_schema-version: "3.2"
ID: sapui5project1
version: 1.0.0
description: "A SAPUI5 3D Animated Dashboard"

modules:
  - name: sapui5project1-approuter
    type: approuter.nodejs
    path: sapui5project1-approuter
    requires:
      - name: sapui5project1_html_repo_runtime
    parameters:
      disk-quota: 256M
      memory: 256M

  - name: sapui5project1-ui-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: sapui5project1_html_repo_host
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - sapui5project1.zip
          name: sapui5project1
          target-path: resources/

  - name: sapui5project1
    type: html5
    path: .
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build

resources:
  - name: sapui5project1_html_repo_runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: sapui5project1_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
