specVersion: "3.0"
metadata:
  name: sapui5project1
type: application
framework:
  name: SAPUI5
  version: "1.120.0" # Use a recent stable version
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.f
    - name: sap.ui.layout
    - name: themelib_sap_horizon
builder:
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: sapui5project1
        additionalFiles:
        - xs-app.json
